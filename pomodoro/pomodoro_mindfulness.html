<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Taskflow Timer – Mindfulness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050910;
            --grad1: #1b3b4a;
            --grad2: #203b3a;
            --accent: #9be7ff;
            --accent-soft: rgba(155, 231, 255, 0.35);
            --accent2: #ffd6a5;
            --text: #fdfdfd;
            --muted: #c3d4d9;
            --ring-bg: rgba(255, 255, 255, 0.08);
            --ring-fg: #9be7ff;
            --toast-bg: rgba(5, 12, 18, 0.96);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 79vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, #1b3b4a 0, #050910 55%, #020308 100%);
            color: var(--text);
            overflow: hidden;
        }

        .breathing-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 0%, rgba(155, 231, 255, 0.18), transparent 60%),
                radial-gradient(circle at 80% 100%, rgba(255, 214, 165, 0.18), transparent 60%);
            opacity: 0.7;
            animation: breathe 12s ease-in-out infinite;
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }

            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 24px 22px 26px;
            border-radius: 24px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.85));
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.85),
                0 0 0 1px rgba(255, 255, 255, 0.06);
            text-align: center;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .inner {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--accent2);
            opacity: 0.9;
        }

        .mode-label {
            margin-top: 14px;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.9;
        }

        .mode-label span {
            padding: 2px 10px;
            border-radius: 999px;
            border: 1px solid rgba(155, 231, 255, 0.6);
            background: radial-gradient(circle at top, rgba(155, 231, 255, 0.18), transparent 70%);
            box-shadow: 0 0 12px rgba(155, 231, 255, 0.4);
        }

        .timer-shell {
            margin: 20px auto 12px;
            width: 220px;
            height: 220px;
            position: relative;
        }

        .timer-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .timer-ring .bg {
            stroke: var(--ring-bg);
        }

        .timer-ring .fg {
            stroke: var(--ring-fg);
            filter: drop-shadow(0 0 10px rgba(155, 231, 255, 0.7));
            transition: stroke-dashoffset 0.4s ease-out;
        }

        .timer-core {
            position: absolute;
            inset: 18%;
            border-radius: 50%;
            background:
                radial-gradient(circle at 30% 0%, rgba(155, 231, 255, 0.25), transparent 60%),
                radial-gradient(circle at 70% 100%, rgba(255, 214, 165, 0.25), transparent 60%),
                radial-gradient(circle, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.98));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(0, 0, 0, 0.9);
            animation: core-breathe 10s ease-in-out infinite;
        }

        @keyframes core-breathe {
            0% {
                transform: scale(0.98);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(0.98);
            }
        }

        #timer {
            font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 2.7rem;
            letter-spacing: 0.12em;
            color: #fefbff;
            text-shadow:
                0 0 8px rgba(155, 231, 255, 0.9),
                0 0 18px rgba(255, 214, 165, 0.7);
        }

        .phase-label {
            margin-top: 6px;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .controls {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            position: relative;
            padding: 9px 18px;
            font-size: 0.85rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.9));
            color: var(--text);
            cursor: pointer;
            overflow: hidden;
            transition:
                transform 0.12s ease-out,
                box-shadow 0.12s ease-out,
                border-color 0.12s ease-out,
                background 0.12s ease-out;
        }

        button::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(155, 231, 255, 0.35), rgba(255, 214, 165, 0.35));
            opacity: 0;
            transition: opacity 0.18s ease-out;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 0 12px rgba(155, 231, 255, 0.4),
                0 0 18px rgba(255, 214, 165, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        button:hover::before {
            opacity: 0.7;
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
        }

        .btn-primary {
            border-color: rgba(155, 231, 255, 0.7);
        }

        .btn-secondary {
            border-color: rgba(255, 214, 165, 0.7);
        }

        .settings-toggle {
            margin-top: 16px;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            opacity: 0.9;
            transition: color 0.15s ease-out, opacity 0.15s ease-out;
        }

        .settings-toggle:hover {
            color: var(--accent);
            opacity: 1;
        }

        .settings-toggle-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .settings-panel {
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.9));
            padding: 10px 12px 12px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-4px);
            transition:
                max-height 0.28s ease,
                opacity 0.28s ease,
                transform 0.28s ease;
        }

        .settings-panel.open {
            max-height: 220px;
            opacity: 1;
            transform: translateY(0);
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .settings-row:last-child {
            margin-bottom: 0;
        }

        .settings-row label {
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        .settings-row input[type="number"] {
            width: 64px;
            padding: 4px 6px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.85);
            color: var(--text);
            text-align: center;
            font-size: 0.8rem;
            outline: none;
        }

        .settings-row input[type="number"]::-webkit-inner-spin-button,
        .settings-row input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .settings-row input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .settings-row span.hint {
            font-size: 0.7rem;
            color: var(--muted);
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(120%);
            background: var(--toast-bg);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            opacity: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition:
                transform 0.25s ease-out,
                opacity 0.25s ease-out;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px rgba(155, 231, 255, 0.9);
        }

        @media (max-width: 480px) {
            .container {
                padding: 18px 14px 20px;
                border-radius: 20px;
            }

            .timer-shell {
                width: 190px;
                height: 190px;
            }

            #timer {
                font-size: 2.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="breathing-bg"></div>
    <div class="container">
        <div class="inner">
            <h1>Taskflow Timer</h1>
            <div class="subtitle">Breathe • Focus • Release</div>

            <div class="mode-label">
                <span id="modeLabel">Session</span>
            </div>

            <div class="timer-shell">
                <svg class="timer-ring" viewBox="0 0 120 120">
                    <circle class="bg" cx="60" cy="60" r="52"></circle>
                    <circle class="fg" cx="60" cy="60" r="52"></circle>
                </svg>
                <div class="timer-core">
                    <div id="timer">00:00</div>
                    <div class="phase-label" id="phaseLabel">Ready</div>
                </div>
            </div>

            <div class="controls">
                <button id="start" class="btn-primary"><span>Start</span></button>
                <button id="reset" class="btn-secondary"><span>Reset</span></button>
            </div>

            <div class="settings-toggle" id="settingsToggle">
                <div class="settings-toggle-icon">⚙</div>
                <span>Timer Settings</span>
            </div>

            <div class="settings-panel" id="settingsPanel">
                <div class="settings-row">
                    <label for="session-length">Session (min)</label>
                    <input type="number" id="session-length" value="25" min="1" max="180">
                </div>
                <div class="settings-row">
                    <label for="break-length">Break (min)</label>
                    <input type="number" id="break-length" value="5" min="1" max="60">
                </div>
                <div class="settings-row">
                    <label for="enable-sound">Sound</label>
                    <input type="checkbox" id="enable-sound" checked>
                    <span class="hint">Soft chime on phase change</span>
                </div>
                <div class="settings-row">
                    <label for="enable-notify">Notify</label>
                    <input type="checkbox" id="enable-notify">
                    <span class="hint">Desktop notification (if allowed)</span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-dot"></div>
        <span id="toastText">Session complete</span>
    </div>

    <script>
        (function () {
            const timerDisplay = document.getElementById('timer');
            const phaseLabel = document.getElementById('phaseLabel');
            const modeLabel = document.getElementById('modeLabel');
            const startButton = document.getElementById('start');
            const resetButton = document.getElementById('reset');
            const sessionLengthInput = document.getElementById('session-length');
            const breakLengthInput = document.getElementById('break-length');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const enableSound = document.getElementById('enable-sound');
            const enableNotify = document.getElementById('enable-notify');
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');

            const ringFg = document.querySelector('.timer-ring .fg');
            const RADIUS = 52;
            const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
            ringFg.style.strokeDasharray = `${CIRCUMFERENCE} ${CIRCUMFERENCE}`;
            ringFg.style.strokeDashoffset = `${CIRCUMFERENCE}`;

            let timerInterval = null;
            let isRunning = false;
            let isBreak = false;
            let timeLeft = 0;
            let totalTime = 0;

            function initFromSession() {
                isBreak = false;
                const mins = parseInt(sessionLengthInput.value, 10) || 25;
                totalTime = mins * 60;
                timeLeft = totalTime;
                updateTimerDisplay();
                updatePhaseLabels();
                updateRing();
            }

            function updateTimerDisplay() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent =
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            function updatePhaseLabels() {
                if (isBreak) {
                    phaseLabel.textContent = 'Break';
                    modeLabel.textContent = 'Break';
                } else {
                    phaseLabel.textContent = 'Session';
                    modeLabel.textContent = 'Session';
                }
            }

            function updateRing() {
                if (totalTime <= 0) {
                    ringFg.style.strokeDashoffset = `${CIRCUMFERENCE}`;
                    return;
                }
                const progress = 1 - (timeLeft / totalTime);
                const offset = CIRCUMFERENCE * progress;
                ringFg.style.strokeDashoffset = `${offset}`;
            }

            function showToast(message) {
                toastText.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2600);
            }

            function playChime() {
                if (!enableSound.checked) return;
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(660, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.4);
                    g.gain.setValueAtTime(0.0001, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.7);
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.start();
                    o.stop(ctx.currentTime + 0.75);
                } catch (e) { }
            }

            function requestNotificationPermissionIfNeeded() {
                if (!enableNotify.checked) return;
                if (!('Notification' in window)) return;
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }

            function sendNotification(message) {
                if (!enableNotify.checked) return;
                if (!('Notification' in window)) return;
                if (Notification.permission === 'granted') {
                    new Notification('Taskflow Timer', { body: message });
                }
            }

            function tick() {
                timeLeft--;
                updateTimerDisplay();
                updateRing();

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    isRunning = false;

                    if (isBreak) {
                        isBreak = false;
                        const mins = parseInt(sessionLengthInput.value, 10) || 25;
                        totalTime = mins * 60;
                        timeLeft = totalTime;
                        updatePhaseLabels();
                        updateTimerDisplay();
                        updateRing();
                        playChime();
                        showToast('Break complete – Session');
                        sendNotification('Break complete. Time to focus.');
                    } else {
                        isBreak = true;
                        const mins = parseInt(breakLengthInput.value, 10) || 5;
                        totalTime = mins * 60;
                        timeLeft = totalTime;
                        updatePhaseLabels();
                        updateTimerDisplay();
                        updateRing();
                        playChime();
                        showToast('Session complete – Break');
                        sendNotification('Session complete. Take a break.');
                    }

                    startTimer();
                }
            }

            function startTimer() {
                if (isRunning) return;
                isRunning = true;
                startButton.querySelector('span').textContent = 'Pause';
                phaseLabel.textContent = isBreak ? 'Break' : 'Session';
                requestNotificationPermissionIfNeeded();

                timerInterval = setInterval(tick, 1000);
            }

            function pauseTimer() {
                if (!isRunning) return;
                isRunning = false;
                startButton.querySelector('span').textContent = 'Resume';
                clearInterval(timerInterval);
                timerInterval = null;
            }

            function resetTimer() {
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                startButton.querySelector('span').textContent = 'Start';
                initFromSession();
                phaseLabel.textContent = 'Ready';
            }

            startButton.addEventListener('click', () => {
                if (!isRunning && timeLeft === 0) {
                    initFromSession();
                }
                if (isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            resetButton.addEventListener('click', resetTimer);

            settingsToggle.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
            });

            sessionLengthInput.addEventListener('change', () => {
                if (!isRunning && !isBreak) {
                    initFromSession();
                }
            });

            breakLengthInput.addEventListener('change', () => {
                if (!isRunning && isBreak) {
                    const mins = parseInt(breakLengthInput.value, 10) || 5;
                    totalTime = mins * 60;
                    timeLeft = totalTime;
                    updateTimerDisplay();
                    updateRing();
                }
            });

            initFromSession();
        })();
    </script>
</body>

</html>
